<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lauritz Fokdal Koch</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, Arial, sans-serif;
            background: #eff4fb;
            color: #1e2530;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(circle at top left, rgba(23, 107, 197, 0.18), transparent 28%),
                        linear-gradient(180deg, #f8fbff 0%, #eaf1f8 100%);
        }
        .hero {
            position: relative;
            width: min(100%, 980px);
            background: rgba(255,255,255,0.96);
            border-radius: 32px;
            box-shadow: 0 28px 80px rgba(33,40,60,0.12);
            overflow: hidden;
            border: 1px solid rgba(31,73,125,0.08);
            display: grid;
            grid-template-columns: 1.35fr 1fr;
            gap: 0;
        }
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(0, 122, 204, 0.08), transparent 36%),
                        radial-gradient(circle at bottom left, rgba(85, 164, 255, 0.1), transparent 28%);
            pointer-events: none;
        }
        .hero-content {
            padding: 56px 48px;
            position: relative;
            z-index: 1;
        }
        .hero-visual {
            position: relative;
            background: linear-gradient(180deg, #f2f7ff 0%, #e8f0fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
        }
        .avatar-frame {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 28px 50px rgba(12, 86, 179, 0.18);
            border: 4px solid rgba(255,255,255,0.9);
            background: #fff;
        }
        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        h1 {
            margin: 0;
            font-size: clamp(2.4rem, 3vw, 3.4rem);
            line-height: 1.02;
        }
        .subtitle {
            margin: 18px 0 28px;
            color: #4a586b;
            max-width: 520px;
        }
        .actions {
            display: grid;
            gap: 16px;
            margin-top: 12px;
        }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 22px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            text-decoration: none;
            color: #fff;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 16px 32px rgba(0, 78, 156, 0.12);
        }
        .button.primary { background: #0f61d7; }
        .button.secondary { background: #0b4a9c; }
        .button.tertiary { background: #617ca0; }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(0, 78, 156, 0.18);
        }
        footer {
            padding: 24px 48px;
            color: #64748a;
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
        }
        @media (max-width: 860px) {
            .hero {
                grid-template-columns: 1fr;
            }
            .hero-content {
                padding: 36px 28px;
            }
            .hero-visual {
                padding: 36px;
            }
        }
        @media (max-width: 520px) {
            body { padding: 16px; }
            .hero-content { padding: 28px 20px; }
            footer { padding: 20px; }
            .actions { gap: 12px; }
        }
    </style>
</head>
<body>
    <article class="hero">
        <div class="hero-content">
            <header>
                <p style="color:#0f61d7;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;margin:0 0 18px;">Portfolio</p>
                <h1>Lauritz Fokdal Koch</h1>
                <p class="subtitle">A concise personal homepage with fast access to my profile, CV, and job applications.</p>
            </header>
            <div class="actions">
                <a href="profile.html" class="button primary">Profile</a>
                <a href="cv.html" class="button secondary">CV</a>
                <a href="job-applications.html" class="button tertiary">Job applications</a>
            </div>
        </div>
        <div class="hero-visual">
            <div class="avatar-frame">
                <img src="portrait.svg" alt="Lauritz Fokdal Koch portrait">
            </div>
        </div>
        <footer>
            <p>&copy; 2026 Lauritz Fokdal Koch</p>
        </footer>
    </article>
</body>
</html>
