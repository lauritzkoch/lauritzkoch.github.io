<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lauritz Fokdal Koch</title>
    <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>
    <article class="hero">
        <div class="hero-content">
            <header>
                <p class="eyebrow">Portfolio</p>
                <h1>Lauritz Fokdal Koch</h1>
                <p class="subtitle">A concise personal homepage with fast access to my profile, CV, and job applications.</p>
            </header>
            <div class="actions">
                <a href="application-assistant.html" class="button primary">Application Assistant</a>
                <a href="profile.html" class="button secondary">Profile</a>
                <a href="cv.html" class="button secondary">CV</a>
                <a href="job-applications.html" class="button tertiary">Job applications</a>

            <div class="job-input">
                <label for="job-link">Paste Job Posting Link:</label>

                <button id="test-btn" class="button tertiary" type="button">Test Backend</button>

        </div>
        <div class="hero-visual">
            <div class="avatar-frame">
                <img src="assets/images/portrait.jpg" alt="Lauritz Fokdal Koch portrait">

        </div>
        <footer>
            <p>&copy; 2026 Lauritz Fokdal Koch</p>
        </footer>

    <script src="assets/js/header.js"></script>
